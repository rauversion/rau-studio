name: Build installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            os: macos-latest
            artifact: rau-studio-macos-arm64
            tauri_args: --bundles app
            rust_target: ""
            build_target_arg: ""
            bundle_dir: target/release/bundle
            mac_artifact_arch: arm64
            artifact_paths: |
              target/release/bundle/*.app.tar.gz
              target/release/bundle/**/*.app.tar.gz
          - label: macOS Intel
            os: macos-latest
            artifact: rau-studio-macos-intel
            tauri_args: --bundles app
            rust_target: x86_64-apple-darwin
            build_target_arg: --target x86_64-apple-darwin
            bundle_dir: target/x86_64-apple-darwin/release/bundle
            mac_artifact_arch: x86_64
            artifact_paths: |
              target/x86_64-apple-darwin/release/bundle/*.app.tar.gz
              target/x86_64-apple-darwin/release/bundle/**/*.app.tar.gz
          - label: Windows
            os: windows-latest
            artifact: rau-studio-windows
            tauri_args: --bundles nsis,msi
            rust_target: ""
            build_target_arg: ""
            bundle_dir: target/release/bundle
            mac_artifact_arch: ""
            artifact_paths: |
              target/release/bundle/**/*.msi
              target/release/bundle/**/*.exe
          - label: Linux
            os: ubuntu-22.04
            artifact: rau-studio-linux
            tauri_args: --bundles appimage,deb
            rust_target: ""
            build_target_arg: ""
            bundle_dir: target/release/bundle
            mac_artifact_arch: ""
            artifact_paths: |
              target/release/bundle/**/*.AppImage
              target/release/bundle/**/*.deb
              target/release/bundle/**/*.rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust stable
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Add Rust target
        if: matrix.rust_target != ''
        shell: bash
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build installers
        shell: bash
        run: npm run tauri:build -- ${{ matrix.build_target_arg }} ${{ matrix.tauri_args }}

      - name: Ad-hoc sign macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          xattr -cr "${{ matrix.bundle_dir }}/macos/Rau Studio.app"
          codesign --force --deep --sign - "${{ matrix.bundle_dir }}/macos/Rau Studio.app"
          codesign --verify --deep --strict --verbose=2 "${{ matrix.bundle_dir }}/macos/Rau Studio.app"

      - name: Archive macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          arch="${{ matrix.mac_artifact_arch }}"
          tar -C "${{ matrix.bundle_dir }}/macos" \
            -czf "${{ matrix.bundle_dir }}/RauStudio_${version}_${arch}.app.tar.gz" \
            "Rau Studio.app"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14
          path: ${{ matrix.artifact_paths }}

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          mapfile -t files < <(find release-artifacts -type f \( \
            -name '*.app.tar.gz' -o \
            -name '*.msi' -o \
            -name '*.exe' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.rpm' \
          \))

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No installer files found."
            exit 1
          fi

          gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --repo "$GH_REPO" --title "Rau Studio $TAG_NAME" --generate-notes

          gh release upload "$TAG_NAME" "${files[@]}" --repo "$GH_REPO" --clobber
